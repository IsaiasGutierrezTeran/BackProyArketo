# Reverse proxy de Arketo. Único punto de entrada HTTP (puerto 80); Caddy pone
# el TLS delante en 443 y reenvía aquí.
#   /api/    → backend Django (gunicorn :8000), conserva el prefijo /api
#   /floor/  → floorapi (FastAPI :8000), se le quita el prefijo /floor
#   /healthz → 200 (chequeo simple, sin tocar Django)
#   /        → texto de estado
# El microservicio maskrcnn NO se expone aquí (solo lo llama floorapi).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Caddy reenvía por HTTP interno con X-Forwarded-Proto=https. Lo respetamos para
# que Django (SECURE_PROXY_SSL_HEADER) y CSRF lo vean como https. El acceso
# directo por IP (sin ese header) cae a $scheme.
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    https   https;
    http    http;
}

upstream django_up   { server backend:8000; }
upstream floorapi_up { server floorapi:8000; }

server {
    listen 80 default_server;
    server_name _;

    # Subida de planos (PDF/JPG/PNG) y audio para STT.
    client_max_body_size 100m;

    # ── Backend Django (REST + SSE) ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://django_up;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Estáticos del admin/DRF (si se sirvieran desde el contenedor en el futuro).
    location /static/ {
        proxy_pass http://django_up;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }

    # ── floorapi (FastAPI) — se elimina el prefijo /floor con la barra final ────
    # Útil para diagnóstico (/floor/health, /floor/docs). Django lo llama directo
    # por la red interna (http://floorapi:8000), no a través de nginx.
    location /floor/ {
        proxy_pass http://floorapi_up/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 200s;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        default_type text/plain;
        return 200 "Arketo API en linea. API: /api/  Docs: /api/docs  Floor: /floor/\n";
    }
}
